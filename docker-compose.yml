services:
  llm-relay:
    image: ghcr.io/arknill/llm-relay:latest
    container_name: llm-relay
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:8083"
    volumes:
      - llm-relay-data:/data
      - ${HOME:-${USERPROFILE}}/.claude/projects:/data/claude-projects:ro
    environment:
      - LLM_RELAY_UPSTREAM=https://api.anthropic.com
      - LLM_RELAY_DB=/data/usage.db
      - LLM_RELAY_HISTORY=1
      - LLM_RELAY_SSE_PARSE_USAGE=1
      - LLM_RELAY_SCAN_ENABLED=${LLM_RELAY_SCAN_ENABLED:-0}
      - LLM_RELAY_TOKPRESS=${LLM_RELAY_TOKPRESS:-0}
      - LLM_RELAY_CACHE_FIX=${LLM_RELAY_CACHE_FIX:-0}
      - CC_TOKEN_A_YELLOW=${CC_TOKEN_A_YELLOW:-300000}
      - CC_TOKEN_A_ORANGE=${CC_TOKEN_A_ORANGE:-500000}
      - CC_TOKEN_A_RED=${CC_TOKEN_A_RED:-750000}
      - CC_TOKEN_A_HARD=${CC_TOKEN_A_HARD:-900000}
      - CC_TOKEN_CEILING=${CC_TOKEN_CEILING:-1000000}
      - CC_CLAUDE_PROJECTS_DIR=/data/claude-projects
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8083/_health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  llm-relay-data:
