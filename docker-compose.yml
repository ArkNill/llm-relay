services:
  llm-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-relay
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - relay-data:/data
      - ${HOME}/.llm-relay:/data/legacy:ro  # read legacy DB if needed
    environment:
      - LLM_RELAY_UPSTREAM=https://api.anthropic.com
      - LLM_RELAY_DB=/data/usage.db
      - LLM_RELAY_PORT=8080
      - LLM_RELAY_WARN_RATIO=50.0
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/_health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  relay-data:
