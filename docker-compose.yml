services:
  llm-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-relay
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"  # llm-relay 대체 (Claude Code ANTHROPIC_BASE_URL)
      - "127.0.0.1:8082:8080"  # 기존 호환
      # - "<YOUR_TAILSCALE_IP>:8080:8080"  # Optional: bind to Tailscale IP for remote access
    volumes:
      - ${HOME}/.llm-relay:/data/legacy  # llm-relay DB 이어쓰기
      # transcript JSONL 읽기 전용 (display page last-user-prompt 검색).
      # 4/10 23:xx: ~/.claude/projects → ~/.claude-gt/projects 변경.
      # 이유: claudeGt 가 주력 운영 (defence layer 풀세트), llm-relay 프록시 경유 request 는
      # 전부 claudeGt 세션이라 DB vs transcript mount 일관성 맞춤. stock claude 는
      # fallback only 로 proxy 안 타므로 어차피 llm-relay 집계 밖.
      - ${HOME}/.claude-gt/projects:/data/claude-projects:ro
      - /proc:/host/proc:ro  # 호스트 프로세스 확인 (display page liveness check)
    environment:
      - LLM_RELAY_UPSTREAM=https://api.anthropic.com
      - LLM_RELAY_DB=/data/legacy/usage.db
      - LLM_RELAY_PORT=8080
      - LLM_RELAY_WARN_RATIO=50.0
      - CC_CLAUDE_PROJECTS_DIR=/data/claude-projects
      - CC_HOST_PROC=/host/proc
      # GB intercept toggle — set in .env, not here (local-only)
      - LEGACY_TOGGLE=${LEGACY_TOGGLE:-0}
      # CC cache fix — request body normalization for stable prompt caching
      - LLM_RELAY_CACHE_FIX=${LLM_RELAY_CACHE_FIX:-0}
      # Performance toggles — scan/tokpress OFF by default (save 100-350ms/req),
      # SSE usage parsing stays ON for dashboard token tracking.
      - LLM_RELAY_SCAN_ENABLED=${LLM_RELAY_SCAN_ENABLED:-0}
      - LLM_RELAY_TOKPRESS=${LLM_RELAY_TOKPRESS:-0}
      - LLM_RELAY_SSE_PARSE_USAGE=${LLM_RELAY_SSE_PARSE_USAGE:-1}
      # Turn counter token thresholds (Zone A absolute + Zone B ratio)
      - CC_TOKEN_A_YELLOW=${CC_TOKEN_A_YELLOW:-300000}
      - CC_TOKEN_A_ORANGE=${CC_TOKEN_A_ORANGE:-500000}
      - CC_TOKEN_A_RED=${CC_TOKEN_A_RED:-750000}
      - CC_TOKEN_A_HARD=${CC_TOKEN_A_HARD:-900000}
      - CC_TOKEN_CEILING=${CC_TOKEN_CEILING:-1000000}
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/_health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
