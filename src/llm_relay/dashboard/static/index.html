<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>llm-relay Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>llm-relay</h1>
    <nav class="nav-links">
      <a href="/display/">Turn Monitor</a>
      <a href="/history/">History</a>
    </nav>
    <span id="health-badge" class="badge">loading...</span>
  </header>

  <main>
    <section id="turn-monitor">
      <h2>Turn Monitor <span id="turn-updated" class="updated-ts"></span></h2>
      <div id="turn-cards" class="turn-cards"></div>
    </section>

    <section id="context-health">
      <h2>Context Health</h2>
      <div id="health-summary" class="stats-grid"></div>
      <div id="health-sessions" class="health-cards"></div>
    </section>

    <section id="cli-status">
      <h2>CLI Status</h2>
      <div id="cli-cards" class="cards"></div>
    </section>

    <section id="stats">
      <h2>Delegation Stats</h2>
      <div id="stats-content" class="stats-grid"></div>
    </section>

    <section id="history">
      <h2>Recent Delegations</h2>
      <table id="history-table">
        <thead>
          <tr><th>Time</th><th>CLI</th><th>Status</th><th>Duration</th><th>Preview</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <div id="detail-overlay"></div>
  <div id="detail-panel">
    <div class="panel-header">
      <span class="panel-title">Delegation Detail</span>
      <div class="panel-controls">
        <button id="panel-copy" title="Copy details">Copy</button>
        <button id="panel-close" title="Close panel">&times;</button>
      </div>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
